name: build-and-push

# Builda as imagens da API e do painel e publica no GitHub Container Registry (GHCR).
# A VPS (Hostinger) apenas faz pull dessas imagens — não builda nada.
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # nome do owner em minúsculas (requisito do GHCR)
  OWNER: andersonprocesso
  # URL pública da API, embutida no bundle do painel em tempo de build
  VITE_API_URL: https://atendemei.escondigital.com.br

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/atende-mei-api:latest

      - name: Build & push Web
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          push: true
          build-args: |
            VITE_API_URL=${{ env.VITE_API_URL }}
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/atende-mei-web:latest
