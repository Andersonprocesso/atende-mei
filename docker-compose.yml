services:
  postgres:
    image: postgres:16-alpine
    container_name: atendemei-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-atendemei}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atendemei}
      POSTGRES_DB: ${POSTGRES_DB:-atendemei}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-atendemei}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: atendemei-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: atendemei-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-atendemei}:${POSTGRES_PASSWORD:-atendemei}@postgres:5432/${POSTGRES_DB:-atendemei}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      API_PORT: ${API_PORT:-3333}
      JWT_SECRET: ${JWT_SECRET:-troque-este-segredo-em-producao}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      WHATSAPP_PROVIDER: ${WHATSAPP_PROVIDER:-mock}
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-mock}
      FISCAL_PROVIDER: ${FISCAL_PROVIDER:-fake}
    ports:
      - "${API_PORT:-3333}:3333"
    # Em produção rode migrations no deploy; aqui aplicamos ao subir para DX.
    command: sh -c "npx prisma migrate deploy && node dist/main.js"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: atendemei-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3333}
    ports:
      - "5173:80"

volumes:
  pgdata:
  redisdata:
